<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- ══ PAGE HERO ════════════════════════════════════════════ -->
  <div class="page-hero">
    <span class="page-hero-label">Nuestros eventos</span>
    <h1 class="page-hero-title">Galería</h1>
    <p class="page-hero-subtitle">Momentos especiales capturados en cada celebración.</p>
  </div>

  <!-- ══ GALERÍA ══════════════════════════════════════════════ -->
  <section class="section">
    <div class="container">
      <div class="gallery-filters" id="gallery-filters" role="group" aria-label="Filtrar galería"></div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Imagen ampliada">
    <button class="lightbox-close" id="lightbox-close" aria-label="Cerrar">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Anterior">&#8249;</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Siguiente">&#8250;</button>
  </div>

  <script type="module" src="js/page-galeria.js"></script>
</body>
</html>
